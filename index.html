<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Algorithmus</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0a0c14; color: #e2e8f0; min-height: 100vh; }

.header {
  background: #111320; border-bottom: 1px solid #1e2235;
  padding: 18px 28px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 10;
}
.logo { font-size: 20px; font-weight: 800; color: #fff; }
.logo span { color: #6366f1; }
.badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }

.bar { height: 3px; background: #1a1d2e; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); transition: width 1s linear; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

.info { font-size: 12px; color: #475569; margin-bottom: 24px; text-align: center; }
.info b { color: #94a3b8; }

/* Karten */
.karten { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
@media(max-width:700px){ .karten { grid-template-columns: repeat(2,1fr); } }
.karte { background: #111320; border: 1px solid #1e2235; border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
.karte::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.karte.lila::after  { background: #6366f1; }
.karte.gruen::after { background: #22c55e; }
.karte.gelb::after  { background: #f59e0b; }
.karte.pink::after  { background: #ec4899; }
.karte .label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.karte .wert  { font-size: 28px; font-weight: 800; color: #fff; }
.karte.gruen .wert { color: #22c55e; }
.karte.gelb  .wert { color: #f59e0b; }
.karte.pink  .wert { color: #ec4899; }

/* Abschnitt-Titel */
.titel { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 16px; margin-top: 8px; display: flex; align-items: center; gap: 8px; }
.titel small { font-size: 12px; color: #475569; font-weight: 400; }

/* ── TOP 10 ── */
.top10-liste { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }

.top10-karte {
  background: #111320;
  border: 1px solid #1e2235;
  border-radius: 14px;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 14px;
  align-items: center;
  transition: border-color .15s, transform .1s;
}
.top10-karte:hover { border-color: #6366f1; transform: translateY(-1px); }

.rang {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; flex-shrink: 0;
}
.rang-1 { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
.rang-2 { background: #94a3b822; color: #94a3b8; border: 1px solid #94a3b844; }
.rang-3 { background: #b4521422; color: #b45214; border: 1px solid #b4521444; }
.rang-x { background: #1e2235; color: #475569; }

.top10-mitte { min-width: 0; }
.top10-frage { font-size: 14px; font-weight: 600; color: #e2e8f0; line-height: 1.4; margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top10-tags  { display: flex; flex-wrap: wrap; gap: 6px; }

.tag { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.tag-grau   { background: #1e2235; color: #64748b; }
.tag-lila   { background: #6366f122; color: #a78bfa; border: 1px solid #6366f133; }
.tag-gruen  { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e33; }
.tag-rot    { background: #ef444422; color: #ef4444; border: 1px solid #ef444433; }
.tag-gelb   { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b33; }

.top10-rechts { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }

.richtung-btn {
  padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 800;
  display: inline-block; white-space: nowrap;
}
.ja-btn   { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
.nein-btn { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }

.einsatz-info { text-align: right; }
.einsatz-zahl { font-size: 20px; font-weight: 800; color: #fff; }
.einsatz-sub  { font-size: 11px; color: #475569; margin-top: 2px; }
.einsatz-sub b { color: #22c55e; }

.wetten-btn {
  display: inline-block;
  background: #6366f1;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  border-radius: 8px;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
}
.wetten-btn:hover { background: #4f46e5; }

/* Chancen-Balken */
.chance-wrap { margin-top: 6px; }
.chance-label { font-size: 10px; color: #475569; margin-bottom: 3px; }
.chance-bar { height: 4px; background: #1e2235; border-radius: 2px; }
.chance-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #6366f1, #22c55e); }

/* Alle Märkte */
.tabelle-wrap { background: #111320; border: 1px solid #1e2235; border-radius: 14px; overflow: hidden; }
.t-kopf { display: grid; grid-template-columns: 2.5fr 80px 80px 80px 90px 110px;
  padding: 12px 20px; background: #0d0f1a; border-bottom: 1px solid #1e2235; }
.t-kopf span { font-size: 10px; color: #334155; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
.t-kopf span:not(:first-child) { text-align: center; }
.zeile { display: grid; grid-template-columns: 2.5fr 80px 80px 80px 90px 110px;
  padding: 13px 20px; border-bottom: 1px solid #0e1019; align-items: center; font-size: 13px; }
.zeile:last-child { border-bottom: none; }
.zeile:hover { background: #13162200; }
.zeile .frage { color: #94a3b8; line-height: 1.4; }
.zeile .zelle { text-align: center; color: #64748b; }
.zeile .zelle.pos { color: #22c55e; font-weight: 700; }
.zeile .zelle.neg { color: #ef4444; font-weight: 700; }
.zeile .zelle a {
  display: inline-block; background: #1e2235; color: #a78bfa;
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; text-decoration: none;
}
.zeile .zelle a:hover { background: #6366f1; color: #fff; }

.leer { text-align: center; padding: 48px; color: #334155; font-size: 14px; }
.spinner { text-align: center; padding: 60px; color: #334155; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Poly<span>Algo</span></div>
  <div id="badge" class="badge">Lädt...</div>
</div>
<div class="bar"><div class="bar-fill" id="balken" style="width:100%"></div></div>

<div class="wrap">
  <div class="info">
    Update: <b id="letztes">—</b> &nbsp;·&nbsp;
    Nächstes: <b id="naechstes">—</b> &nbsp;·&nbsp;
    <b id="quelle">—</b>
  </div>

  <!-- Karten -->
  <div class="karten">
    <div class="karte lila">
      <div class="label">Dein Kapital</div>
      <div class="wert" id="kapital">$—</div>
    </div>
    <div class="karte pink">
      <div class="label">Beste Wetten</div>
      <div class="wert" id="anz-top">—</div>
    </div>
    <div class="karte gelb">
      <div class="label">Gesamt-Einsatz</div>
      <div class="wert" id="einsatz">$—</div>
    </div>
    <div class="karte gruen">
      <div class="label">Erwart. Gewinn</div>
      <div class="wert" id="gewinn">$—</div>
    </div>
  </div>

  <!-- TOP 10 -->
  <div class="titel">🏆 Deine 10 besten Wetten <small>höchste Gewinnchance zuerst</small></div>
  <div class="top10-liste" id="top10">
    <div class="spinner">Märkte werden analysiert...</div>
  </div>

  <!-- Alle Märkte -->
  <div class="titel">📊 Alle Märkte <small id="markt-anzahl"></small></div>
  <div class="tabelle-wrap">
    <div class="t-kopf">
      <span>Markt</span>
      <span>Markt %</span>
      <span>Algo %</span>
      <span>Vorteil</span>
      <span>Einsatz</span>
      <span>Link</span>
    </div>
    <div id="tabelle">
      <div class="spinner">Daten werden geladen...</div>
    </div>
  </div>
</div>

<script>
let startZeit = Date.now();

function rangKlasse(i) {
  if (i === 0) return "rang-1";
  if (i === 1) return "rang-2";
  if (i === 2) return "rang-3";
  return "rang-x";
}

function lade() {
  fetch("/api/daten")
    .then(r => r.json())
    .then(d => {
      document.getElementById("letztes").textContent   = d.letztes_update    || "—";
      document.getElementById("naechstes").textContent = d.naechstes_update  || "—";
      document.getElementById("quelle").textContent    = d.quelle            || "—";
      document.getElementById("badge").textContent     = d.status === "OK" ? "Live" : d.status;
      document.getElementById("kapital").textContent   = "$" + (d.bankroll        || 0);
      document.getElementById("einsatz").textContent   = "$" + (d.gesamt_einsatz  || 0);
      document.getElementById("gewinn").textContent    = "$" + (d.gesamt_gewinn   || 0);

      const top10 = d.top10 || [];
      document.getElementById("anz-top").textContent  = top10.length;

      // ── TOP 10 ──
      const top10El = document.getElementById("top10");
      if (top10.length === 0) {
        top10El.innerHTML = `<div class="leer">Algorithmus sucht nach den besten Wetten...</div>`;
      } else {
        top10El.innerHTML = top10.map((e, i) => `
          <div class="top10-karte">
            <div class="rang ${rangKlasse(i)}">${i + 1}</div>

            <div class="top10-mitte">
              <div class="top10-frage" title="${e.frage}">${e.frage}</div>
              <div class="top10-tags">
                <span class="tag tag-grau">Markt: ${e.markt_p}%</span>
                <span class="tag tag-lila">Algo: ${e.modell_p}%</span>
                <span class="tag ${e.edge >= 0 ? 'tag-gruen' : 'tag-rot'}">
                  Vorteil: ${e.edge > 0 ? '+' : ''}${e.edge}%
                </span>
                <span class="tag tag-grau">${e.tage} Tage</span>
                <span class="tag tag-gelb">💰 Vol: $${e.volumen.toLocaleString()}</span>
              </div>
              <div class="chance-wrap">
                <div class="chance-label">Gewinnchance: ${e.gewinn_chance}%</div>
                <div class="chance-bar">
                  <div class="chance-fill" style="width:${e.gewinn_chance}%"></div>
                </div>
              </div>
            </div>

            <div class="top10-rechts">
              <div class="richtung-btn ${e.richtung === 'JA' ? 'ja-btn' : 'nein-btn'}">
                ${e.richtung === 'JA' ? '✅ JA wetten' : '❌ NEIN wetten'}
              </div>
              <div class="einsatz-info">
                <div class="einsatz-zahl">$${e.einsatz}</div>
                <div class="einsatz-sub">Erw. Gewinn: <b>+$${e.erw_gewinn}</b></div>
              </div>
              <a class="wetten-btn" href="${e.link}" target="_blank">
                🎯 Jetzt wetten →
              </a>
            </div>
          </div>
        `).join("");
      }

      // ── Alle Märkte ──
      const tab  = document.getElementById("tabelle");
      const alle = d.alle_maerkte || [];
      document.getElementById("markt-anzahl").textContent = alle.length + " analysiert";

      if (alle.length === 0) {
        tab.innerHTML = `<div class="leer">Keine Märkte gefunden.</div>`;
      } else {
        tab.innerHTML = alle.map(e => `
          <div class="zeile">
            <div class="frage">${e.frage}</div>
            <div class="zelle">${e.markt_p}%</div>
            <div class="zelle">${e.modell_p}%</div>
            <div class="zelle ${e.edge >= 0 ? 'pos' : 'neg'}">${e.edge > 0 ? '+' : ''}${e.edge}%</div>
            <div class="zelle">${e.einsatz > 0 ? '$' + e.einsatz : '—'}</div>
            <div class="zelle">
              <a href="${e.link}" target="_blank">→ Polymarket</a>
            </div>
          </div>
        `).join("");
      }

      startZeit = Date.now();
    })
    .catch(() => {
      document.getElementById("badge").textContent = "Verbindungsfehler";
    });
}

function tickBalken() {
  const vergangen = (Date.now() - startZeit) / 1000;
  const rest      = Math.max(0, 300 - vergangen);
  document.getElementById("balken").style.width = (rest / 300 * 100) + "%";
  setTimeout(tickBalken, 1000);
}

lade();
setInterval(lade, 300000);
tickBalken();
</script>
</body>
</html>
